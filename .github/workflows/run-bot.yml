name: Trump Alert Bot

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state back to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests curl-cffi beautifulsoup4 python-dotenv cloudscraper seleniumbase

    - name: Install Headless Chrome and Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb google-chrome-stable

    - name: Run the Bot Multiple Times
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Workaround to poll every ~2 minutes while honoring GitHub's 5-minute cron limit.
        # This will run the bot 3 times per workflow activation, sleeping 100 seconds between runs.
        for i in {1..3}; do
          echo "=== Starting pass $i ==="
          xvfb-run python bot.py
          if [ $i -ne 3 ]; then
            echo "Sleeping for 100 seconds before next pass..."
            sleep 100
          fi
        done

    - name: Save seen posts state
      run: |
        # This step commits the seen_posts.json file back to the repository so the bot 
        # remembers which posts it has already alerted on for the next run.
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add seen_posts.json
        
        # Only commit and push if the file actually changed
        git diff --quiet && git diff --staged --quiet || (git commit -m "[bot] update seen posts state" && git push)
